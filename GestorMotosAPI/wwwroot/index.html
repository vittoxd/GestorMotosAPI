<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Motos - Panel Profesional</title>
    <link rel="stylesheet" href="Estilo.css">
</head>
<body>
    <nav class="navbar">
        <button onclick="mostrarSeccion('seccion-motos', this)" class="nav-btn active">Motos 🏍️</button>
        <button onclick="mostrarSeccion('seccion-mecanicos', this)" class="nav-btn">Personal 🔧</button>
    </nav>

    <main class="contenedor-principal">
        <div id="notificacion" style="display: none;"></div>

        <div id="seccion-motos" class="seccion-app">
            <section class="panel-formulario">
                <form id="formulario_moto">
                    <fieldset>
                        <legend><strong> Registro de Entrada 🏍️ </strong></legend>
                        <div>
                            <label>Marca:</label>
                            <input type="hidden" id="input-id">
                            <input type="text" id="input-marca" placeholder="Ej: Honda" required>
                        </div>
                        <div>
                            <label>Modelo:</label>
                            <input type="text" id="input-modelo" placeholder="Ej: CB500X" required>
                        </div>
                        <div>
                            <label>Año:</label>
                            <input type="number" id="input-anio" placeholder="2024" required>
                        </div>
                        <div>
                            <label>Kilometraje:</label>
                            <input type="number" id="input-kilometraje" placeholder="Km" required>
                        </div>
                        <div>
                            <label for="input-patente">Patente</label>
                            <input type="type" id="input-patente" placeholder="Ej:ABC12" maxlength="8" style="text-transform: uppercase" />
                        </div>
                        <label>RUT dueño:</label>
                        <input type="text" id="input-rut" placeholder="12.345.687-9" required>
                        <button type="submit" style="margin-top:15px;">REGISTRAR MOTO 🚀</button>
                    </fieldset>
                </form>
            </section>

            <section class="panel-inventario">
                <h2>Inventario de Motos</h2>
                <input type="text" id="input-busqueda" placeholder="Buscar por marca...">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>RUT</th>
                            <th>Patente</th>
                            <th>Marca</th>
                            <th>Modelo</th>
                            <th>Año</th>
                            <th>Km</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpo-tabla"></tbody>
                </table>
            </section>
        </div>
        <div id="seccion-mecanicos" class="seccion-app" style="display: none;">
            <section class="panel-formulario">
                <form id="formulario_personal">
                    <fieldset>
                        <legend><strong> Registro De Personal </strong> </legend>
                        <div>
                            <label>Rut:</label>
                            <input type="hidden" id="input-id-mecanico">
                            <input type="text" id="input-rut-mecanico" placeholder="Ej:12.345.678-9" required>
                        </div>
                        <div>
                            <label> Nombre Completo:</label>
                            <input type="text" id="input-nombre-mecanico" placeholder="Ej: Juan Mecanico" required>
                        </div>
                        <div>
                            <label>Especialidad:</label>
                            <select id="select-especialidad" style="width: 100%; padding: 10px; background-color: #333; color: white; border: 1px solid #444; border-radius: 4px; margin-top: 5px; font-family: inherit; font-size: 16px;" required>
                                <option value="">Seleccione una especialidad...</option>
                                <option value="Mecanico General">Mecanico General</option>
                                <option value="Electricista">Electricidad Automotriz</option>
                                <option value="Desabolladura y Pintura">Desabolladura y Pintura</option>
                                <option value="Mantencion Rapida">Mantención Rápida</option>
                            </select>
                        </div>
                        <div>
                            <label>Teléfono</label>
                            <input type="text" id="input-telefono-mecanico" placeholder="Ej: +56 9 1234 5678" required>
                        </div>
                        <div>
                            <button type="button" style="margin-top: 15px; background-color: #ff6600; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase;">
                                REGISTRAR TRABAJADOR!
                            </button>
                        </div>
                    </fieldset>
                </form>
            </section>
            <section class="panel-inventario">
                <h2> Plantilla de Mecanico</h2>
                <div style="margin-bottom: 15px;">
                    <input type="text" id="input-busqueda-mecanico" placeholder="Buscar por nombre o Rut"/>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>RUT</th>
                            <th>Nombre</th>
                            <th>Especialidad</th>
                            <th>Teléfono</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpo-tabla-mecanicos">
                    </tbody>
                </table>
                </section>
        </div>


</main>

    <script src="app.js"></script>
</body>
</html>
