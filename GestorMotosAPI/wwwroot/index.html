<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Motos - Panel Profesional</title>
    <link rel="stylesheet" href="Estilo.css">
</head>
<body>
    <main class="contenedor-principal">
    
    <div id="notificacion" style="padding: 10px; margin-bottom: 10px; display: none; border-radius: 5px;"></div>

    <section id="seccion-registro" class="panel-formulario">
        <form id="formulario_moto">
            <fieldset>
                <legend><strong> Registro de Entrada  </strong></legend>
                
                <div>
                    <label>Marca:</label>
                    <input type="hidden" id="input-id">
                    <input type="text" id="input-marca" placeholder="Ej: Honda" required>
                </div>
                <div>
                    <label>Modelo:</label>
                    <input type="text" id="input-modelo" placeholder="Ej: CB500X" required>
                </div>
                <div>
                    <label>Año:</label>
                    <input type="number" id="input-anio" min="1900" max="2027" placeholder="2024" required>
                </div>
                <div>
                    <label>Kilometraje:</label>
                    <input type="number" id="input-kilometraje" min="0" placeholder="Km actuales" required>
                </div>

                <label> RUT dueño:</label>
                <input type="text" id = "input-rut" placeholder="12.345.687-9" required>

                <div style="margin-top: 10px;">
                    <button type="submit">Registrar Moto en Sistema 🏍️💨</button>
                </div>
                
            </fieldset>
        </form>
    </section>

    <br> <section id="seccion-listado" class="panel-inventario">
        <h2> Inventario de Motos</h2>
        
        <div id="busqueda-container" style="margin-top: 15px; margin-bottom: 15px;">
            <label>🔍 Filtrar:</label>
            <input type="text" id="input-busqueda" placeholder="Buscar por marca o modelo...">
        </div>

        <table border="1" style="width: 100%; text-align: left;">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>RUT dueño</th>
                    <th>Marca</th>
                    <th>Modelo</th>
                    <th>Año</th>
                    <th>Kilometraje</th>
                    <th>Acciones</th> 
                </tr>
            </thead>
            <tbody id="cuerpo-tabla"></tbody>
        </table>
    </section>
</main>

<script src="app.js"></script>
</body>
</html>
